<!DOCTYPE html>
<html>
<head>
    <title>Order Success</title>
    <style>
        body{
            background:linear-gradient(120deg,#11998e,#38ef7d);
            font-family:Segoe UI, Tahoma, sans-serif;
        }

        .box{
            width:400px;
            margin:120px auto;
            background:white;
            border-radius:12px;
            text-align:center;
            padding:30px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h2{
            color:#27ae60;
        }

        p{
            color:#555;
            margin:15px 0;
        }

        button{
            padding:12px 25px;
            background:#27ae60;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#219150;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>✅ Order Placed Successfully!</h2>
    <p>Thank you for shopping with us.</p>

    <form action="/products">
        <button>🏠 Go to Home</button>
    </form>
</div>

</body>
</html>
