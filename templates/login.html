<!DOCTYPE html>
<html>
<head>
    <title>User Login</title>
    <style>
        body{
            margin:0;
            font-family:'Segoe UI', Tahoma, sans-serif;
            background:linear-gradient(120deg,#43cea2,#185a9d);
        }

        .container{
            width:380px;
            margin:120px auto;
            background:white;
            border-radius:12px;
            box-shadow:0 15px 30px rgba(0,0,0,0.3);
            padding:30px;
        }

        h2{
            text-align:center;
            color:#444;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:12px;
            border-radius:6px;
            border:1px solid #ccc;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#43cea2;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:12px;
            background:#43cea2;
            color:white;
            font-size:16px;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        button:hover{
            background:#36b89c;
        }

        .register-link{
            text-align:center;
            margin-top:15px;
            font-size:14px;
        }

        .register-link a{
            color:#185a9d;
            font-weight:600;
            text-decoration:none;
        }

        .register-link a:hover{
            text-decoration:underline;
        }

        .error{
            color:red;
            text-align:center;
            font-size:14px;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>🔐 User Login</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="register-link">
        New user?
        <a href="/register">Create Account</a>
    </div>

</div>

</body>
</html>
